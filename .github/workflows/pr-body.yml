name: pr-body

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-body:
    name: pr-body
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 scripts/check_pr_body.py
