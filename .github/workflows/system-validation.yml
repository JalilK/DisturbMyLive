name: system-validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

concurrency:
  group: system-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  system-validation:
    name: system-validation
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install tooling
        run: brew install xcodegen swiftlint

      - name: Full verify
        run: ./scripts/verify.sh all
