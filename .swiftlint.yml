included:
  - App
  - Features
  - Core
  - Tests

excluded:
  - .build
  - DerivedData
  - .git
  - DisturbMyLive.xcodeproj

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - modifier_order
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

analyzer_rules: []

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 700

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

reporter: "github-actions-logging"
strict: true
